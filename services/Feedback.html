<!DOCTYPE html>
<html>
<head><title></title></head>
<body>
<script src="https://www.gstatic.com/firebasejs/8.4.3/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.4.3/firebase-analytics.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.4.3/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.4.3/firebase-database.js"></script>
<script>
var firebaseConfig = {
    apiKey: WebviumFeedbackHelper.apiKey(),
    authDomain: WebviumFeedbackHelper.authDomain(),
    projectId: WebviumFeedbackHelper.projectId(),
    storageBucket: WebviumFeedbackHelper.storageBucket(),
    messagingSenderId: WebviumFeedbackHelper.messagingSenderId(),
    appId: WebviumFeedbackHelper.appId(),
    measurementId: WebviumFeedbackHelper.measurementId()
};
firebase.initializeApp(firebaseConfig);
firebase.analytics();
firebase.database().ref('feedbacks/').push().set({ Webvium: WebviumFeedbackHelper.getWebviumVersion(), Message: WebviumFeedbackHelper.getMessage(), Log: WebviumFeedbackHelper.getLog() });
WebviumFeedbackHelper.succeed()

</script>
</body>
</html>
