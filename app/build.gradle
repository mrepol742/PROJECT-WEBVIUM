apply plugin: 'com.android.application'

android {
    compileSdkVersion 30
    buildToolsVersion "30.0.3"

    lintOptions {
        abortOnError false
    }

    defaultConfig {
        applicationId "com.mrepol742.webvium"
        minSdkVersion 21
        targetSdkVersion 30
        // only change versionCode when building the final release apk
        versionCode 20210727
        // versionCode Integer.parseInt(new Date().format("yyyyMMdd"))
        // only change versionName when building the final release apk
        versionName "1.8"
        // < 1.0 The version i know what i am doing,
        // > 1.5 Now only god knows.
        proguardFiles getDefaultProguardFile(
                'proguard-android-optimize.txt'), 'proguard-rules.pro'
        android.applicationVariants.all { variant ->
            variant.outputs.all {
                outputFileName = "webvium-${variant.name}.apk"
            }
        }
    }

    buildTypes {

        debug {
            debuggable true
            minifyEnabled false
        }

        release {
            debuggable false
            minifyEnabled true
            shrinkResources true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_7
        targetCompatibility JavaVersion.VERSION_1_7
    }
}
