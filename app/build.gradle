apply plugin: 'com.android.application'

android {

    signingConfigs {

        github {
            storeFile file("webvium-keystore.jks")
            storePassword "b22821e32b94ce5c2cfa202552f9c6b53a4b7e84"
            keyAlias "Webvium"
            keyPassword "08c8a719ae2f45bb33cc480d880551f7e8683c30"
        }

    }

    compileSdkVersion 30
    buildToolsVersion "30.0.3"

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 30
        versionCode getVersionCode()
        versionName getVersionName()
        proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard.rules"
    }

    buildTypes {
    
        github {
            debuggable true
            minifyEnabled false
            signingConfig signingConfigs.github
            applicationVariants.all { variant ->
                variant.outputs.all { output ->
                    outputFileName = "Webvium_v-${getVersionName()}_c-${ getVersionCode()}.apk"
                }
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
}

static def getVersionName() {
    return new Date().format("yy.MM.dd")
}

static def getVersionCode() {
    return Integer.parseInt(new Date().format("HHmmss"))
}


