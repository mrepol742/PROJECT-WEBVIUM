apply plugin: 'com.android.application'

android {
    compileSdkVersion 30
    buildToolsVersion "30.0.3"

    lintOptions {
        abortOnError false
    }

    defaultConfig {
        applicationId "com.mrepol742.webvium"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode Integer.parseInt(new Date().format("ddMMyyyy"))
        versionName "1.2"
        proguardFiles getDefaultProguardFile(
                'proguard-android-optimize.txt'), 'proguard-rules.pro'
        applicationVariants.all { variant ->
            if (variant.getBuildType().isMinifyEnabled()) {
                variant.assemble.doLast {
                    variant.mappingFile.renameTo(file(
                            "${variant.mappingFile.parent}/mapping-${variant.versionName}.txt"))
                }
            }
        }
    }

    buildTypes {

        debugWithMinify {
            debuggable true
            minifyEnabled true
            shrinkResources true
        }

        release {
            debuggable false
            minifyEnabled true
            shrinkResources true
            applicationVariants.all{
                variant ->
                    variant.outputs.each {
                        output ->
                            output.outputFileName = "Webvium-v" + versionName + ".apk"
                    }
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}