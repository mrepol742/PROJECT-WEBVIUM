apply plugin: 'com.android.application'

android {
    compileSdkVersion 30
    buildToolsVersion "30.0.3"

    lintOptions {
        abortOnError false
    }

    defaultConfig {
        applicationId "com.mrepol742.webvium"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode Integer.parseInt(new Date().format("Hmmss"))
        versionName new Date().format("yy.MM.dd")
        proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
    }

    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
            resValue "bool", "wv", "true"
        }

        release {
            debuggable false
            minifyEnabled true
            resValue "bool", "wv", "false"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}